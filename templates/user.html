{% extends "base.html" %}
{% block title %}User{% endblock %}
{% block content %}
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for msg in messages %}
                <p>{{msg}}</p>
            {% endfor %}
        {% endif %}
    {% endwith %}
<form action="#" method="POST">
    <p><input type="email" name="email" placeholder=" enter email" value="{{email if email}}"/></p> 
    <p><input type="password" name="password" placeholder="yeni sifre(istege bagli)"/></p>
    <p><input type="submit" value="submit"/></p> 
    </form>
{% endblock %}
